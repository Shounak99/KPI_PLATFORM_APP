<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KPI Platform{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'projects:project_list' %}">KPI Platform</a>
      <div class="ms-auto">
        {% if request.user.is_authenticated %}
          <span class="text-light me-3">{{ request.user.username }} ({{ request.user.role }})</span>
          <a href="{% url 'accounts:logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
          <a href="{% url 'accounts:register' %}" class="btn btn-light btn-sm">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
