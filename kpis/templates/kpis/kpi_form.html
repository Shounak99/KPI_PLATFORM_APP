{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}New KPI{% endblock %}

{% block content %}
    <h1>New KPI for {{ project.name }}</h1>
    <form method="post">
      {% csrf_token %} {{ form|crispy }}
      <button type="submit">Save</button>
    </form>
    <a href="{% url 'projects:project_detail' project.pk %}">Cancel</a>
{% endblock %}
